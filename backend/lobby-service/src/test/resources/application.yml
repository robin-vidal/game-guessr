spring:
  application:
    name: lobby-service

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

kafka:
  topics:
    room-events: game.room.events

lobby:
  room:
    max-players: 8
    default-round-count: 5
    default-time-limit-seconds: 60
    code-length: 6
    ttl-minutes: 120
