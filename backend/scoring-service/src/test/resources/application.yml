spring:
  application:
    name: scoring-service

  datasource:
    url: jdbc:h2:mem:scoringdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

kafka:
  topics:
    guess-submitted: player.guess.submitted
    score-calculated: score.calculated

scoring:
  points:
    game-correct: 1000
    level-base: 500
    level-time-bonus-max: 500
    spot-max: 5000
