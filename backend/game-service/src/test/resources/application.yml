spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: game-service-test
      auto-offset-reset: earliest

kafka:
  topics:
    guess-submitted: player.guess.submitted
    round-update: game.round.update
    room-events: game.room.events

server:
  port: 0
