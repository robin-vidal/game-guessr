spring:
  application:
    name: game-service

  # ── JPA / Hibernate ──────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Kafka ─────────────────────────────────────────────────────────────
  kafka:
    consumer:
      group-id: game-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.gameguessr.game.infrastructure.messaging.event"
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ── Server ───────────────────────────────────────────────────────────────
server:
  port: 8082
  servlet:
    context-path: /

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── SpringDoc / Swagger ───────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /api-docs

# ── Custom Kafka topic names ──────────────────────────────────────────────
kafka:
  topics:
    guess-submitted: player.guess.submitted
    round-update: game.round.update
    room-events: game.room.events

---
# ════════════════════════════════════════════════
# Profile: dev  (H2 in-memory, no real Kafka)
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:gamedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092

---
# ════════════════════════════════════════════════
# Profile: local  (Postgres + Kafka in Docker, service on host)
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
# Requires: docker compose up -d  (from project root)
# ════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/gamedb
    username: gameuser
    password: gamepass
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:db/seed.sql

  kafka:
    bootstrap-servers: localhost:9092

---
# ════════════════════════════════════════════════
# Profile: docker  (all services in Docker)
# ════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:gamedb}
    username: ${DB_USER:gameuser}
    password: ${DB_PASSWORD:gamepass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
