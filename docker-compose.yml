services:

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gg-postgres
    environment:
      POSTGRES_DB: gamedb
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scoringdb.sh:/docker-entrypoint-initdb.d/init-scoringdb.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gameuser -d gamedb" ]
      interval: 5s
      timeout: 5s
      retries: 10
  postgres-auth:
    image: postgres:16-alpine
    container_name: gg-postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5434:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      # - ./docker/init-authdb.sh:/docker-entrypoint-initdb.d/init-authdb.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U authuser -d authdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka (KRaft mode — no ZooKeeper) ───────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gg-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # KRaft cluster ID
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Kafka UI (optional, nice for debugging topics) ───────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gg-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── game-service ─────────────────────────────────────────────────────
  game-service:
    build:
      context: ./backend/game-service
      dockerfile: Dockerfile
    container_name: gg-game-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_NAME: gamedb
      DB_USER: gameuser
      DB_PASSWORD: gamepass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    profiles:
      - app

  # ── lobby-service ────────────────────────────────────────────────────
  lobby-service:
    build:
      context: ./backend/lobby-service
      dockerfile: Dockerfile
    container_name: gg-lobby-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    profiles:
      - app

  # ── scoring-service ──────────────────────────────────────────────────
  scoring-service:
    build:
      context: ./backend/scoring-service
      dockerfile: Dockerfile
    container_name: gg-scoring-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_NAME: scoringdb
      DB_USER: gameuser
      DB_PASSWORD: gamepass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    profiles:
      - app

  # ── leaderboard-service ──────────────────────────────────────────────
  leaderboard-service:
    build:
      context: ./backend/leaderboard-service
      dockerfile: Dockerfile
    container_name: gg-leaderboard-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    profiles:
      - app

  # ── auth-service ──────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: gg-auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres-auth
      DB_NAME: authdb
      DB_USER: authuser
      DB_PASSWORD: authpass
    profiles:
      - app

  # ── noclip frontend ──────────────────────────────────────────────
  noclip-frontend:
    build:
      context: ./backend/noclip
      dockerfile: Dockerfile
    container_name: gg_noclip
    ports:
      - "8000:80"
    restart: unless-stopped
    environment:
      PUBLIC_ENABLE_UI: false

  # ── game-guessr frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NOCLIP_FRONTEND_URL: http://gg_noclip
    container_name: gg_frontend
    ports:
      - "5173:80"
    environment:
      NOCLIP_FRONTEND_URL: http://gg_noclip
    profiles:
      - app

volumes:
  postgres_data:
  postgres_auth_data:
