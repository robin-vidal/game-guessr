apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: game-guessr-dev
nameSuffix: -dev

resources:
  - ../../base
  - infra/

patches:
  - path: gateway-gateway-patch.yaml
    target:
      kind: Gateway
      name: game-guessr-gke-gateway
  - path: frontend-deployment-patch.yaml
    target:
      kind: Deployment
      name: game-guessr-frontend
  - path: frontend-httproute-patch.yaml
    target:
      kind: HTTPRoute
      name: game-guessr-frontend
  - path: pgadmin-deployment-patch.yaml
    target:
      kind: Deployment
      name: pgadmin
