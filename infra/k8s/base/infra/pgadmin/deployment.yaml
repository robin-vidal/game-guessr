apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      initContainers:
        - name: init-servers-config
          image: busybox
          env:
            - name: POSTGRES_HOST
              value: "postgresql"
            - name: POSTGRES_USER
              value: "gameuser"
          command:
            - sh
            - -c
            - |
              cat > /config/servers.json <<EOF
              {
                "Servers": {
                  "1": {
                    "Name": "PostgreSQL",
                    "Group": "Servers",
                    "Host": "$POSTGRES_HOST",
                    "Port": 5432,
                    "MaintenanceDB": "postgres",
                    "Username": "$POSTGRES_USER",
                    "SSLMode": "prefer"
                  }
                }
              }
              EOF
          volumeMounts:
            - name: servers-config
              mountPath: /config
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          ports:
            - containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: pgadmin-secret
                  key: email
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgadmin-secret
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: servers-config
              mountPath: /pgadmin4/servers.json
              subPath: servers.json
              readOnly: true
      volumes:
        - name: servers-config
          emptyDir: {}
